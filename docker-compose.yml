services:
  db:
    image: postgres:16-alpine
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orgmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orgmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/orgmanager
      SECRET_KEY: ${SECRET_KEY:-super-secret-demo-key-32-chars-min}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: